<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080809"/>
<meta http-equiv="Permissions-Policy" content="camera=*"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Tatanka Nutrition"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
<title>Tatanka Nutrition</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#080809;color:#eee;font-family:system-ui,sans-serif;min-height:100vh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:inherit}
input,select,textarea{font-size:16px!important}
button{touch-action:manipulation;cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
#app{max-width:480px;margin:0 auto}
#nav{position:fixed;bottom:0;left:0;right:0;background:#0c0c0f;border-top:1px solid #1c1c22;display:flex;z-index:100}
.nav-btn{flex:1;padding:10px 0;background:none;border:none;color:#444;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{color:#ff4c00}
.nav-icon{font-size:18px}
.card{background:#0c0c0f;border:1px solid #1c1c22;border-radius:6px;padding:14px;margin-bottom:10px}
.ct{font-size:10px;letter-spacing:.12em;color:#333;text-transform:uppercase;font-weight:700;margin-bottom:12px}
.inp{background:#080809;border:1px solid #1c1c22;border-radius:4px;color:#eee;padding:9px 10px;width:100%;outline:none}
.inp:focus{border-color:#ff4c00}
.sel{background:#080809;border:1px solid #1c1c22;border-radius:4px;color:#eee;padding:9px 10px;width:100%;outline:none}
.ta{background:#080809;border:1px solid #1c1c22;border-radius:4px;color:#eee;padding:9px 10px;width:100%;outline:none;resize:none;line-height:1.5}
.ta:focus{border-color:#ff4c00}
label{font-size:11px;color:#444;letter-spacing:.06em;display:block;margin-bottom:4px}
.btn{background:#ff4c00;border:none;border-radius:4px;color:#fff;font-weight:900;letter-spacing:.06em;padding:10px 18px;font-size:14px;cursor:pointer}
.btn:active{opacity:.7}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.obj-btn{flex:1;padding:10px 4px;border:1px solid #1c1c22;background:#0c0c0f;color:#444;font-size:11px;font-weight:900;cursor:pointer;line-height:1.4}
.obj-btn.active{background:#ff4c00;border-color:#ff4c00;color:#fff}
.day-btn{padding:5px;border:1px solid #1c1c22;border-radius:3px;background:#0c0c0f;color:#444;font-size:11px;font-weight:700;cursor:pointer;flex:1}
.day-btn.on{background:#ff4c00;border-color:#ff4c00;color:#fff}
.sw{position:relative;margin-top:10px}
.drop{background:#141418;border:1px solid #2a2a35;border-radius:4px;max-height:240px;overflow-y:auto;margin-top:6px}
.di{padding:10px 12px;border-bottom:1px solid #1e1e24;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.di:active{background:#1c1c22}
.mb-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.mb-track{flex:1;height:5px;background:#111;border-radius:3px;overflow:hidden}
.mb-fill{height:100%;border-radius:3px}
.mh{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:2px 0}
.adj-btn{width:36px;height:36px;border:1px solid #2a2a35;background:#111;color:#eee;font-size:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-weight:900}
.adj-btn:active{background:#ff4c00;border-color:#ff4c00}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#0c0c0f;border:1px solid #2a2a35;border-radius:12px 12px 0 0;width:100%;max-width:480px;padding:20px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:900;letter-spacing:.08em;margin-bottom:14px}
.fav-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#111;border:1px solid #1c1c22;border-radius:4px;margin-bottom:6px;cursor:pointer}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2ecc71;color:#fff;font-weight:900;font-size:13px;padding:10px 20px;border-radius:20px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.water-btn{flex:1;padding:10px 4px;border:1px solid #1a3a5c;background:#0a1e2e;color:#4db8ff;font-size:12px;font-weight:900;cursor:pointer;border-radius:4px}
.water-btn:active{background:#1a3a5c}
/* SPLASH */
#splash{position:fixed;inset:0;background:#080809;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#splash.hide{animation:fadeOut .6s forwards}
@keyframes fadeOut{to{opacity:0;pointer-events:none}}
/* SCANNER */
#scanner-modal{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column}
#scanner-header{padding:16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.8);position:absolute;top:0;left:0;right:0;z-index:10}
#scanner-viewport{width:100%;height:100%;position:relative;overflow:hidden}
#scanner-viewport video{width:100%;height:100%;object-fit:cover}
#scanner-viewport canvas{display:none}
/* Masquer l'UI par défaut de html5-qrcode */
#qr-reader{width:100%!important;height:100%!important;border:none!important}
#qr-reader__dashboard{display:none!important}
#qr-reader__status_span{display:none!important}
#qr-reader__camera_selection{display:none!important}
#qr-reader img{display:none!important}
#scanner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
#scanner-box{width:260px;height:120px;border:2px solid #ff4c00;border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
#scanner-line{position:absolute;width:240px;height:2px;background:#ff4c00;animation:scan 2s ease-in-out infinite}
@keyframes scan{0%,100%{top:20%}50%{top:75%}}
#scanner-status{position:absolute;bottom:100px;left:0;right:0;text-align:center;font-size:13px;font-weight:700;color:#eee;text-shadow:0 1px 4px #000;padding:8px}
#scanner-result{position:absolute;bottom:0;left:0;right:0;background:#0c0c0f;border-top:1px solid #2a2a35;padding:16px;transform:translateY(100%);transition:transform .3s}
#scanner-result.show{transform:translateY(0)}
/* GRAPHIQUE */
.chart-wrap{overflow-x:auto;padding-bottom:4px}
.chart-svg{display:block}
</style>
</head>

function isOn(d){
  if(!profile||!profile.planning)return false;
  const dow=new Date(d+'T12:00:00').getDay();
  return(profile.planning[(dow+6)%7]||0)===1;
}
function totals(d){
  const day=getDay(d);let kcal=0,prot=0,carbs=0,fat=0;
  MEALS.forEach(m=>(day[m.key]||[]).forEach(e=>{kcal+=e.kcal;prot+=e.prot;carbs+=e.carbs;fat+=e.fat}));
  return{kcal:Math.round(kcal),prot:+prot.toFixed(1),carbs:+carbs.toFixed(1),fat:+fat.toFixed(1)};
}
function calcMacros(p){
  if(!p)return null;
  const w=parseFloat(p.poids),t=parseFloat(p.taille),a=parseFloat(p.age);
  if(!w||!t||!a)return null;
  // Mode manuel
  if(p.manualMode&&p.manualKcalOn&&p.manualKcalOff){
    const prot=Math.round(w*(PPK[p.objectif||'maintien']));
    const fat=Math.round(w*0.8);
    const kcalOn=p.manualKcalOn+(adj.adjOn||0);
    const kcalOff=p.manualKcalOff+(adj.adjOff||0);
    const plan=p.planning||[0,1,1,1,0,1,1];
    const nbOn=plan.filter(Boolean).length,nbOff=7-nbOn;
    return{tdee:Math.round((kcalOn*nbOn+kcalOff*nbOff)/7),kcalOn,kcalOff,prot,fat,
      glucOn:Math.max(20,Math.round((kcalOn-prot*4-fat*9)/4)),
      glucOff:Math.max(20,Math.round((kcalOff-prot*4-fat*9)/4)),
      nbOn,nbOff,ppk:(PPK[p.objectif||'maintien']).toFixed(1),manual:true};
  }
  const bmr=p.genre==='femme'?(10*w)+(6.25*t)-(5*a)-161:(10*w)+(6.25*t)-(5*a)+5;
  const am={sed:1.2,light:1.375,mod:1.55,active:1.725,vactive:1.9};
  const af=am[p.activite||'mod']||1.55;
  const tdee=bmr*af;
  const ppk=PPK[p.objectif||'maintien'];
  const prot=Math.round(w*ppk),fat=Math.round(w*0.8);
  const plan=p.planning||[0,1,1,1,0,1,1];
  const nbOn=plan.filter(Boolean).length,nbOff=7-nbOn;
  let kWeek=p.objectif==='prise'?tdee*7+400*nbOn:p.objectif==='seche'?tdee*7*0.82:tdee*7;
  const kOff=Math.min(bmr*af,(kWeek/7)*0.88);
  const kOn=nbOn>0?(kWeek-kOff*nbOff)/nbOn:kWeek/7;
  const kcalOn=Math.round(kOn)+(adj.adjOn||0);
  const kcalOff=Math.round(kOff)+(adj.adjOff||0);
  const protKcal=prot*4,fatKcal=fat*9;
  return{tdee:Math.round(tdee),kcalOn,kcalOff,prot,fat,
    glucOn:Math.max(20,Math.round((kcalOn-protKcal-fatKcal)/4)),
    glucOff:Math.max(20,Math.round((kcalOff-protKcal-fatKcal)/4)),
    nbOn,nbOff,ppk:ppk.toFixed(1)};
}

// Calcul %MG US Navy — formule Hodgdon & Beckett officielle
function calcBF(genre,taille,tourTaille,tourCou,tourHanche){
  const h=parseFloat(taille),wt=parseFloat(tourTaille),nc=parseFloat(tourCou),hip=parseFloat(tourHanche)||0;
  if(!h||!wt||!nc)return null;
  let bf;
  if(genre==='femme'){
    if(!hip)return null;
    // Femme : 495 / (1.29579 - 0.35004×log10(taille+hanche-cou) + 0.22100×log10(hauteur)) - 450
    bf=495/(1.29579-0.35004*Math.log10(wt+hip-nc)+0.22100*Math.log10(h))-450;
  } else {
    // Homme : 495 / (1.0324 - 0.19077×log10(taille-cou) + 0.15456×log10(hauteur)) - 450
    bf=495/(1.0324-0.19077*Math.log10(wt-nc)+0.15456*Math.log10(h))-450;
  }
  return Math.max(3,Math.min(50,+bf.toFixed(1)));
}

let html5QrScanner=null;
function openScanner(mealKey){
  scannerMealKey=mealKey;lastScannedCode=null;
  document.getElementById('scanner-modal').style.display='flex';
  document.getElementById('scanner-status').textContent='Initialisation caméra...';
  document.getElementById('scanner-result').classList.remove('show');
  startHtml5Qr();
}
function startHtml5Qr(){
  const viewport=document.getElementById('scanner-viewport');
  viewport.innerHTML='<div id="qr-reader" style="width:100%;height:100%"></div>';

  html5QrScanner=new Html5Qrcode('qr-reader');
  html5QrScanner.start(
    {facingMode:'environment'},
    {
      fps:10,
      qrbox:{width:250,height:250},
      aspectRatio:1.0,
      disableFlip:false
    },
    function(decodedText){
      if(decodedText===lastScannedCode)return;
      lastScannedCode=decodedText;
      document.getElementById('scanner-status').textContent='✅ Code détecté';
      fetchOFF(decodedText);
    },
    function(){}  // erreurs silencieuses (NotFoundException normal)
  ).then(function(){
    scannerActive=true;
    document.getElementById('scanner-status').textContent='📷 Pointez sur un code-barres';
  }).catch(function(err){
    document.getElementById('scanner-status').textContent='❌ '+(err||'Caméra non disponible');
    console.error('Scanner error:',err);
  });
}

function fetchOFF(barcode){
  var status=document.getElementById('scanner-status');
  var resultBox=document.getElementById('scanner-result');
  var resultContent=document.getElementById('scanner-result-content');
  if(status)status.textContent='🔍 Recherche du produit...';
  var url='https://world.openfoodfacts.org/api/v0/product/'+encodeURIComponent(barcode)+'.json?fields=product_name,product_name_fr,nutriments,brands';
  fetch(url)
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){
      if(data.status!==1||!data.product){
        if(status)status.textContent='❌ Produit non trouvé ('+barcode+')';
        return;
      }
      var p=data.product;
      var n=p.nutriments||{};
      var name=(p.product_name_fr||p.product_name||'Produit inconnu').substring(0,60);
      var kcal=Math.round(n['energy-kcal_100g']||0);
      var prot=parseFloat((n.proteins_100g||0).toFixed(1));
      var carbs=parseFloat((n.carbohydrates_100g||0).toFixed(1));
      var fat=parseFloat((n.fat_100g||0).toFixed(1));
      if(!kcal){if(status)status.textContent='⚠️ Produit sans données nutritionnelles';return;}
      // Stockage global pour éviter les apostrophes dans onclick
      _pendingScannedFood={id:90000+Date.now()%999999,name:name,cat:'En ligne',kcal:kcal,prot:prot,carbs:carbs,fat:fat};
      if(status)status.textContent='✅ '+name;
      if(resultContent)resultContent.innerHTML=
        '<div style="font-size:13px;font-weight:700;margin-bottom:6px">'+esc(name)+'</div>'
        +'<div style="font-size:11px;color:#555;margin-bottom:12px">'+kcal+' kcal · '+prot+'g P · '+carbs+'g G · '+fat+'g L</div>'
        +'<div style="display:flex;gap:8px">'
        +'<button onclick="addScannedFood()" style="flex:1;background:#ff4c00;border:none;border-radius:4px;color:#fff;font-weight:900;padding:12px;font-size:13px;cursor:pointer">+ Ajouter au repas</button>'
        +'<button onclick="closeScanner()" style="background:none;border:1px solid #333;border-radius:4px;color:#888;padding:12px 16px;cursor:pointer">✕</button>'
        +'</div>';
      if(resultBox)resultBox.classList.add('show');
    })
    .catch(function(err){
      if(status)status.textContent='❌ Erreur réseau';
      console.error('fetchOFF error:',err);
    });
}

function addScannedFood(){
  var food=_pendingScannedFood;
  var mealKey=scannerMealKey;
  if(!food||!mealKey)return;
  var existing=DB.find(function(d){return d.name===food.name&&d.kcal===food.kcal;});
  if(!existing){DB.push(food);existing=food;}
  if(!SS[mealKey])SS[mealKey]={q:'',food:null,grams:'100'};
  SS[mealKey].food=existing;SS[mealKey].q=existing.name;SS[mealKey].grams='100';
  closeScanner();
  render();
  setTimeout(function(){var g=document.getElementById('gi-'+mealKey);if(g){g.focus();g.select();}},50);
}

function closeScanner(){
  if(html5QrScanner){
    html5QrScanner.stop().then(function(){
      html5QrScanner.clear();
      html5QrScanner=null;
    }).catch(function(){html5QrScanner=null;});
  }
  scannerActive=false;
  document.getElementById('scanner-modal').style.display='none';
  document.getElementById('scanner-viewport').innerHTML='';
  scannerMealKey=null;lastScannedCode=null;_pendingScannedFood=null;
}

function openCopyDay(fromDs){
  document.getElementById('copy-day-modal')?.remove();
  const opts=[];
  // 14 jours avant
  for(let i=7;i>=1;i--){
    const d=new Date(fromDs+'T12:00:00');d.setDate(d.getDate()-i);
    opts.push(d.toISOString().slice(0,10));
  }
  // 14 jours après jusqu'à aujourd'hui inclus
  for(let i=1;i<=14;i++){
    const d=new Date(fromDs+'T12:00:00');d.setDate(d.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    if(ds>todayStr())break;
    opts.push(ds);
  }
  const div=document.createElement('div');div.id='copy-day-modal';div.className='modal-bg';
  div.innerHTML=`<div class="modal" style="padding-bottom:30px">
    <div class="modal-title">📋 Copier la journée du ${fmtD(fromDs)}</div>
    <div style="font-size:11px;color:#555;margin-bottom:14px">Vers quelle date ? (repas + eau + note copiés)</div>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto">
      ${opts.filter(d=>d!==fromDs).map(ds=>`
        <button onclick="copyFullDay('${fromDs}','${ds}')" style="background:#111;border:1px solid #1c1c22;border-radius:4px;color:#eee;padding:12px;font-size:13px;font-weight:700;cursor:pointer;text-align:left">
          ${ds===todayStr()?'📍 ':''}<span style="color:${ds===todayStr()?'#ff4c00':'#eee'}">${fmtD(ds)}</span>
          <span style="color:#333;font-size:10px;float:right">${totals(ds).kcal>0?totals(ds).kcal+'kcal':''}</span>
        </button>`).join('')}
    </div>
    <button onclick="document.getElementById('copy-day-modal').remove()" style="width:100%;background:none;border:1px solid #1c1c22;border-radius:4px;color:#555;padding:10px;font-size:13px;cursor:pointer;margin-top:12px">Annuler</button>
  </div>`;
  document.body.appendChild(div);
}
function copyFullDay(fromDs,toDs){
  const src=journal[fromDs];if(!src){document.getElementById('copy-day-modal')?.remove();return;}
  const dst=getDay(toDs);
  MEALS.forEach(m=>{
    const entries=src[m.key]||[];
    if(entries.length>0){
      if(!dst[m.key])dst[m.key]=[];
      entries.forEach(e=>dst[m.key].push({...e,id:Date.now()+Math.random()}));
    }
  });
  // Copier eau
  if(waterLog[fromDs]&&!waterLog[toDs]){waterLog[toDs]=waterLog[fromDs];ls.set(WATERK,waterLog);}
  // Copier note
  if(notes[fromDs]&&!notes[toDs]){notes[toDs]=notes[fromDs];ls.set(NK,notes);}
  saveJ();
  document.getElementById('copy-day-modal')?.remove();
  date=toDs;
  toast('📋 Journée copiée vers '+fmtD(toDs),'#9b59b6');render();
}

function initWaterReminder(){
  if(!('Notification' in window))return;
  // Demander permission si pas encore accordée
  if(Notification.permission==='default'){
    Notification.requestPermission();
  }
}

function scheduleWaterReminder(){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const now=new Date();
  const h=now.getHours();
  // Seulement entre 7h et 22h
  if(h<7||h>=22)return;
  const water=getWater(date);
  const tgt=getWaterTarget();
  const pct=tgt>0?water/tgt:0;
  if(pct>=1)return; // objectif atteint, pas de rappel
  const remaining=Math.round(tgt-water);
  new Notification('💧 Tatanka Nutrition',{
    body:`Il te reste ${remaining}ml à boire aujourd'hui. Reste hydraté !`,
    icon:'icon-192.png',
    badge:'icon-192.png',
    tag:'water-reminder'
  });
}

// Vérifier toutes les 2h si un rappel est nécessaire
function startWaterReminderLoop(){
  initWaterReminder();
  // Premier rappel après 2h
  setInterval(()=>{
    scheduleWaterReminder();
  }, 2*60*60*1000);
}


// ─── DERNIERS ALIMENTS UTILISÉS ────────────────────────────
function getRecentFoods(limit=8){
  const ids=[];
  const seen=new Set();
  // Parcourir le journal des 7 derniers jours
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const j=journal[ds];
    if(!j)continue;
    Object.values(j).forEach(arr=>{
      if(!Array.isArray(arr))return;
      arr.forEach(e=>{
        if(e.foodId&&!seen.has(e.foodId)){
          seen.add(e.foodId);
          ids.push(e.foodId);
        }
      });
    });
    if(ids.length>=limit)break;
  }
  return ids.slice(0,limit).map(id=>DB.find(f=>f.id===id)).filter(Boolean);
}

function getDailyMotiv(){
  const day=new Date().getDate();
  return MOTIV_MSGS[day % MOTIV_MSGS.length];
}

function calcStreak(){
  const today=new Date().toISOString().slice(0,10);
  let streak=0;
  let d=new Date();
  while(true){
    const ds=d.toISOString().slice(0,10);
    const j=journal[ds];
    const hasFood=j&&Object.values(j).some(arr=>Array.isArray(arr)&&arr.length>0);
    if(hasFood){
      streak++;
      d.setDate(d.getDate()-1);
    } else {
      // Si c'est aujourd'hui et pas encore de repas, on vérifie hier
      if(ds===today){d.setDate(d.getDate()-1);continue;}
      break;
    }
    if(streak>365)break;
  }
  return streak;
}

function copierJour(fromDs){
  const from=journal[fromDs];
  if(!from){toast('Aucun repas à copier','#e74c3c');return;}
  const today=new Date().toISOString().slice(0,10);
  if(!journal[today])journal[today]={};
  let count=0;
  Object.entries(from).forEach(([k,arr])=>{
    if(!Array.isArray(arr)||arr.length===0)return;
    if(!journal[today][k])journal[today][k]=[];
    arr.forEach(e=>{
      journal[today][k].push({...e,id:Date.now()+Math.random()});
      count++;
    });
  });
  saveJ();
  date=today;
  showTab('journal');
  toast('📋 '+count+' aliment(s) copié(s) !');
}

// ─── BILAN HEBDO PARTAGEABLE ───────────────────────────────
function shareWeek(){
  const m=profile?calcMacros(profile):null;
  const today=new Date();
  const dow=today.getDay();
  const monday=new Date(today);
  monday.setDate(today.getDate()-(dow===0?6:dow-1));
  let days=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const tot=totals(ds);
    const on=isOn(ds);
    const tgtKcal=m?(on?m.kcalOn:m.kcalOff):0;
    const isFuture=d>today;
    days.push({ds,tot,tgtKcal,isFuture,label:['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'][i]});
  }
  const active=days.filter(function(d){return !d.isFuture&&d.tot.kcal>0;});
  const avgKcal=active.length?Math.round(active.reduce(function(s,d){return s+d.tot.kcal;},0)/active.length):0;
  const avgProt=active.length?Math.round(active.reduce(function(s,d){return s+d.tot.prot;},0)/active.length):0;
  const streak=calcStreak();
  const jrsLine=days.map(function(d){
    if(d.isFuture)return d.label+': -';
    if(d.tot.kcal===0)return d.label+': X';
    const pct=d.tgtKcal?Math.round(d.tot.kcal/d.tgtKcal*100):null;
    return d.label+': '+Math.round(d.tot.kcal)+'kcal'+(pct?' ('+pct+'%)':'');
  }).join(' | ');
  const text='TATANKA NUTRITION | '+jrsLine+' | Moy: '+avgKcal+'kcal/j '+avgProt+'g prot/j | Jours: '+active.length+'/7 | Streak: '+streak+'j | PERFORM.PROGRESS.';
  if(navigator.share){navigator.share({title:'Bilan semaine Tatanka',text:text}).catch(function(){});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){toast('Bilan copie !','#9b59b6');});}
  else{toast('Partage non supporte','#e74c3c');}
}

function renderBilanHebdo(){
  const m=profile?calcMacros(profile):null;
  const jrs=['D','L','M','M','J','V','S'];
  const today=new Date();
  const dow=today.getDay();
  const monday=new Date(today);
  monday.setDate(today.getDate()-(dow===0?6:dow-1));
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const tot=totals(ds);
    const on=isOn(ds);
    const tgtKcal=m?(on?m.kcalOn:m.kcalOff):0;
    const isToday=ds===today.toISOString().slice(0,10);
    const isFuture=d>today;
    days.push({tot:tot,tgtKcal:tgtKcal,label:jrs[d.getDay()],isToday:isToday,isFuture:isFuture});
  }
  const activeDays=days.filter(function(d){return !d.isFuture&&d.tot.kcal>0;});
  const avgKcal=activeDays.length?Math.round(activeDays.reduce(function(s,d){return s+d.tot.kcal;},0)/activeDays.length):0;
  const avgProt=activeDays.length?Math.round(activeDays.reduce(function(s,d){return s+d.tot.prot;},0)/activeDays.length):0;
  const maxKcal=Math.max.apply(null,days.map(function(d){return d.tot.kcal;}).concat([m?m.kcalOn:2000,1]));
  let bars='';
  days.forEach(function(d){
    const pct=d.isFuture?0:Math.min(100,Math.round(d.tot.kcal/maxKcal*100));
    const col=d.isFuture?'#1a2a1a':d.isToday?'#2ecc71':d.tot.kcal>0?'#3a7a3a':'#1a2a1a';
    const txtCol=d.isToday?'#2ecc71':'#5a8a4a';
    bars+='<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">'
      +'<div style="font-size:9px;color:#3a6a3a;font-weight:700">'+(d.isFuture?'':d.tot.kcal>0?Math.round(d.tot.kcal):'')+'</div>'
      +'<div style="width:100%;height:60px;display:flex;align-items:flex-end;justify-content:center">'
      +'<div style="width:80%;background:'+col+';border-radius:4px 4px 0 0;height:'+pct+'%;min-height:'+(d.tot.kcal>0?4:0)+'px"></div>'
      +'</div>'
      +'<div style="font-size:10px;font-weight:900;color:'+txtCol+'">'+d.label+'</div>'
      +'</div>';
  });
  return '<div style="background:linear-gradient(135deg,#0a1a08,#060e05);border:1px solid #1a3a10;border-radius:12px;padding:12px;margin-bottom:10px">'
    +'<div style="font-size:10px;font-weight:700;color:#7ec850;letter-spacing:.12em;margin-bottom:10px">BILAN DE LA SEMAINE</div>'
    +'<div style="display:flex;align-items:flex-end;gap:2px;height:80px;margin-bottom:6px">'+bars+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid #1a3a10">'
    +'<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:#eee">'+avgKcal+'</div><div style="font-size:8px;color:#5a8a4a">MOY. KCAL/J</div></div>'
    +'<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:#eee">'+avgProt+'g</div><div style="font-size:8px;color:#5a8a4a">MOY. PROT/J</div></div>'
    +'<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:#eee">'+activeDays.length+'/7</div><div style="font-size:8px;color:#5a8a4a">JOURS</div></div>'
    +'</div>'
    +'<button onclick="shareWeek()" style="width:100%;margin-top:10px;background:linear-gradient(135deg,#1a3a0a,#0d2a05);border:1px solid #2ecc71;border-radius:8px;color:#2ecc71;font-size:12px;font-weight:700;padding:10px;cursor:pointer">Partager le bilan de la semaine</button>'
    +'</div>';
}


// ─── HISTORIQUE ────────────────────────────────────────────
let histoRange=14; // nombre de jours affichés

function renderH(){
  const m=profile?calcMacros(profile):null;
  const days=[];
  for(let i=0;i<histoRange;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const tot=totals(ds);const on=isOn(ds);
    const tgtKcal=m?(on?m.kcalOn:m.kcalOff):null;
    const tgtProt=m?m.prot:null;
    const pctKcal=tgtKcal?Math.min(100,Math.round(tot.kcal/tgtKcal*100)):0;
    const pctProt=tgtProt?Math.min(100,Math.round(tot.prot/tgtProt*100)):0;
    const col=pctKcal>=90?'#2ecc71':pctKcal>=70?'#ff8800':'#e74c3c';
    const colP=pctProt>=90?'#2ecc71':pctProt>=70?'#ff8800':'#e74c3c';
    const water=getWater(ds);
    const wpct=Math.min(100,Math.round(water/getWaterTarget()*100));
    const wcol=wpct>=90?'#2ecc71':wpct>=60?'#4db8ff':'#e74c3c';

    const avgK=Math.round(dwd.reduce((a,d)=>a+d.tot.kcal,0)/dwd.length);

    const avgW=Math.round(days.filter(d=>d.water>0).reduce((a,d)=>a+d.water,0)/(days.filter(d=>d.water>0).length||1));

  const mgPts=chartDays.map(d=>parseFloat((measures[d.ds]||{}).mg)||null);
  const leanPts=chartDays.map((d,i)=>{
    const w=wPts[i],mg=mgPts[i];
    return(w&&mg)?+(w-w*mg/100).toFixed(1):null;
  });
  const waterPts=chartDays.map(d=>getWater(d.ds)||null);
  const hasW=wPts.some(v=>v!==null);
  const hasMG=mgPts.some(v=>v!==null);
  const hasLean=leanPts.some(v=>v!==null);
  const hasWater=waterPts.some(v=>v!==null);

    const n=chartDays.length;
    const plotW=W-PAD-RPAD;
    const stepX=n>1?plotW/(n-1):plotW;

    // Echelle gauche : poids et masse maigre
    const leftVals=[...wPts,...leanPts].filter(v=>v!==null);
    const lMin=leftVals.length?Math.floor(Math.min(...leftVals)-1):0;

    // Echelle droite : MG %

    const mgMin=mgVals.length?Math.floor(Math.min(...mgVals)-1):0;
    const mgMax=mgVals.length?Math.ceil(Math.max(...mgVals)+1):30;
    const scaleMG=v=>H-10-((v-mgMin)/(mgMax-mgMin||1))*(H-20);

    const makePath=(pts,scaleFn)=>{
      let p='';
      pts.forEach((v,i)=>{if(v===null)return;const x=PAD+i*stepX;const y=scaleFn(v);p+=(p?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);});
      return p;
    };
    const makeDots=(pts,scaleFn,color,r=3)=>
      pts.map((v,i)=>v!==null?`<circle cx="${(PAD+i*stepX).toFixed(1)}" cy="${scaleFn(v).toFixed(1)}" r="${r}" fill="${color}"/>`:'').join('');

    // Labels dates — 1 sur 3 pour éviter le chevauchement
    const dateLabels=chartDays.map((d,i)=>i%3===0?`<text x="${(PAD+i*stepX).toFixed(1)}" y="${H+12}" fill="#333" font-size="8" text-anchor="middle">${fmtD(d.ds).slice(0,6)}</text>`:'').join('');

    html+=`<div class="card" style="padding:12px 14px;margin-bottom:10px">
      <div class="ct">COURBE COMPOSITION CORPORELLE</div>
      <div class="chart-wrap">
        <svg width="${W}" height="${H+16}" class="chart-svg">
          <line x1="${PAD}" y1="10" x2="${PAD}" y2="${H-10}" stroke="#1c1c22" stroke-width="1"/>
          <line x1="${PAD}" y1="${H-10}" x2="${W-RPAD}" y2="${H-10}" stroke="#1c1c22" stroke-width="1"/>
          <line x1="${W-RPAD}" y1="10" x2="${W-RPAD}" y2="${H-10}" stroke="#1c1c22" stroke-width="1" stroke-dasharray="2,2"/>
          ${leftVals.length?`<text x="2" y="14" fill="#00b4d8" font-size="9">${lMax}</text><text x="2" y="${H-6}" fill="#00b4d8" font-size="9">${lMin}</text>`:''}
          ${mgVals.length?`<text x="${W-RPAD+3}" y="14" fill="#ff8800" font-size="9">${mgMax}%</text><text x="${W-RPAD+3}" y="${H-6}" fill="#ff8800" font-size="9">${mgMin}%</text>`:''}
          ${dateLabels}
          ${hasW?`<path d="${makePath(wPts,scaleL)}" fill="none" stroke="#00b4d8" stroke-width="2" stroke-linejoin="round"/>${makeDots(wPts,scaleL,'#00b4d8')}`:''}
          ${hasLean?`<path d="${makePath(leanPts,scaleL)}" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linejoin="round" stroke-dasharray="5,2"/>${makeDots(leanPts,scaleL,'#2ecc71')}`:''}
          ${hasMG?`<path d="${makePath(mgPts,scaleMG)}" fill="none" stroke="#ff8800" stroke-width="2" stroke-linejoin="round" stroke-dasharray="3,2"/>${makeDots(mgPts,scaleMG,'#ff8800')}`:''}
        </svg>
      </div>
      <div style="display:flex;gap:14px;margin-top:4px;font-size:10px;flex-wrap:wrap">
        ${hasW?`<span><span style="color:#00b4d8;font-weight:700">─</span> Poids (kg)</span>`:''}
        ${hasLean?`<span><span style="color:#2ecc71;font-weight:700">- -</span> Masse maigre (kg)</span>`:''}
        ${hasMG?`<span><span style="color:#ff8800;font-weight:700">- -</span> MG (%)</span>`:''}
      </div>
    </div>`;
  }

  // Bilan sèche — si au moins 2 points de poids + MG
  const bilanDays=days.filter(d=>{
    const w=parseFloat(weights[d.ds]);
    const mg=parseFloat((measures[d.ds]||{}).mg);
    return w>0&&mg>0;
  });
  if(bilanDays.length>=2){
    const first=bilanDays[bilanDays.length-1]; // plus ancien
    const last=bilanDays[0]; // plus récent
    const w0=parseFloat(weights[first.ds]),w1=parseFloat(weights[last.ds]);
    const mg0=parseFloat(measures[first.ds].mg),mg1=parseFloat(measures[last.ds].mg);
    const gras0=+(w0*mg0/100).toFixed(1),gras1=+(w1*mg1/100).toFixed(1);
    const lean0=+(w0-gras0).toFixed(1),lean1=+(w1-gras1).toFixed(1);
    const dPoids=+(w1-w0).toFixed(1);
    const dGras=+(gras1-gras0).toFixed(1);
    const dLean=+(lean1-lean0).toFixed(1);
    const dMG=+(mg1-mg0).toFixed(1);
    const pctGrasPert=gras0>0?Math.round(Math.abs(dGras)/Math.abs(dPoids||1)*100):0;

    html+=`<div class="card" style="padding:12px 14px;margin-bottom:10px;border-color:#ff4c0033">
      <div class="ct" style="color:#ff4c00">📊 BILAN SÈCHE (${fmtD(first.ds).slice(0,6)} → ${fmtD(last.ds).slice(0,6)})</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div style="background:#111;border-radius:4px;padding:10px;text-align:center">
          <div style="font-size:9px;color:#555;margin-bottom:4px">POIDS PERDU</div>
          <div style="font-size:22px;font-weight:900;color:${dPoids<=0?'#2ecc71':'#e74c3c'}">${dPoids>0?'+':''}${dPoids}kg</div>
        </div>
        <div style="background:#111;border-radius:4px;padding:10px;text-align:center">
          <div style="font-size:9px;color:#555;margin-bottom:4px">GRAS PERDU</div>
          <div style="font-size:22px;font-weight:900;color:${dGras<=0?'#2ecc71':'#e74c3c'}">${dGras>0?'+':''}${dGras}kg</div>
        </div>
        <div style="background:#111;border-radius:4px;padding:10px;text-align:center">
          <div style="font-size:9px;color:#555;margin-bottom:4px">MASSE MAIGRE</div>
          <div style="font-size:22px;font-weight:900;color:${dLean>=0?'#2ecc71':'#e74c3c'}">${dLean>0?'+':''}${dLean}kg</div>
        </div>
        <div style="background:#111;border-radius:4px;padding:10px;text-align:center">
          <div style="font-size:9px;color:#555;margin-bottom:4px">MG %</div>
          <div style="font-size:22px;font-weight:900;color:${dMG<=0?'#2ecc71':'#e74c3c'}">${dMG>0?'+':''}${dMG}%</div>
        </div>
      </div>
      <div style="background:#0a1a0a;border:1px solid #1a3a1a;border-radius:4px;padding:10px;font-size:12px;line-height:1.7">
        ${dPoids<0&&dGras<0?`✅ <span style="color:#2ecc71;font-weight:700">${pctGrasPert}% de la perte = masse grasse</span>${pctGrasPert>=80?' — excellente sèche !':pctGrasPert>=60?' — bonne sèche':' — attention à la masse maigre'}`:
        dPoids<0&&dLean<0?`⚠️ <span style="color:#ff8800;font-weight:700">Perte musculaire détectée</span> — revoir le déficit et les protéines`:
        '📊 Continuez à loguer pour obtenir une analyse complète'}
        ${lean1&&lean0?`<br><span style="color:#555">Masse maigre : ${lean0}kg → ${lean1}kg</span>`:''}
      </div>
    </div>`;
  }
  days.forEach(({ds,tot,on,tgtKcal,tgtProt,pctKcal,pctProt,col,colP,water,wpct,wcol})=>{
    const w=weights[ds]||'';const ms=measures[ds]||{tour:'',mg:''};
    const isToday=ds===todayStr();
    const note=notes[ds]||'';

    // Calcul MG auto si mesures tour + cou disponibles
    let bfAuto=null;
    const tourVal=parseFloat(ms.tour)||0;
    const couVal=parseFloat(ms.cou)||0;
    const tailleVal=parseFloat(profile?.taille)||0;
    if(profile&&tourVal>0&&couVal>0&&tailleVal>0){
      bfAuto=calcBF(profile.genre||'homme',tailleVal,tourVal,couVal,parseFloat(ms.hip)||0);
    }

    html+=`<div style="padding:8px 0;border-bottom:1px solid #0f0f0f">
      <div style="display:grid;grid-template-columns:50px 14px 1fr 1fr 56px;gap:4px;align-items:center;margin-bottom:6px">
        <div style="font-size:10px;color:${isToday?'#ff4c00':'#555'};font-weight:${isToday?700:400}">${fmtD(ds).slice(0,6)}</div>
        <div style="font-size:10px">${on?'🔥':'❄️'}</div>
        <div><div style="display:flex;align-items:center;gap:3px"><div style="flex:1;height:4px;background:#111;border-radius:2px;overflow:hidden"><div style="height:100%;width:${pctKcal}%;background:${col}"></div></div><div style="font-size:9px;font-weight:700;color:${col};width:22px;text-align:right">${pctKcal}%</div></div><div style="font-size:9px;color:#333">${tot.kcal}k</div></div>
        <div><div style="display:flex;align-items:center;gap:3px"><div style="flex:1;height:4px;background:#111;border-radius:2px;overflow:hidden"><div style="height:100%;width:${pctProt}%;background:${colP}"></div></div><div style="font-size:9px;font-weight:700;color:${colP};width:22px;text-align:right">${pctProt}%</div></div><div style="font-size:9px;color:#333">${tot.prot}g P</div></div>
        <div style="text-align:right"><div style="font-size:11px;font-weight:700;color:${wcol}">${water>=1000?(water/1000).toFixed(1)+'L':water+'ml'}</div><div style="font-size:8px;color:#333">💧${wpct}%</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;padding-left:64px">
        <div><div style="font-size:9px;color:#444;margin-bottom:2px">⚖️ Poids</div>
          <div style="display:flex;align-items:baseline;gap:2px">
            <input type="number" value="${w}" placeholder="—" step="0.1" style="background:none;border:none;border-bottom:1px solid #1e1e24;color:${w?'#eee':'#333'};font-size:12px;font-weight:700;width:44px;outline:none;padding:1px 0;font-family:inherit" onchange="saveMeasure('${ds}','poids',this.value)">
            <span style="font-size:8px;color:#333">kg</span>
          </div>
        </div>
        <div><div style="font-size:9px;color:#444;margin-bottom:2px">📏 Taille</div>
          <div style="display:flex;align-items:baseline;gap:2px">
            <input type="number" value="${ms.tour}" placeholder="—" step="0.5" style="background:none;border:none;border-bottom:1px solid #1e1e24;color:${ms.tour?'#eee':'#333'};font-size:12px;font-weight:700;width:44px;outline:none;padding:1px 0;font-family:inherit" onchange="saveMeasure('${ds}','tour',this.value)">
            <span style="font-size:8px;color:#333">cm</span>
          </div>
        </div>
        <div><div style="font-size:9px;color:#444;margin-bottom:2px">🔵 Cou</div>
          <div style="display:flex;align-items:baseline;gap:2px">
            <input type="number" value="${ms.cou||''}" placeholder="—" step="0.5" style="background:none;border:none;border-bottom:1px solid #1e1e24;color:${ms.cou?'#eee':'#333'};font-size:12px;font-weight:700;width:36px;outline:none;padding:1px 0;font-family:inherit" onchange="saveMeasure('${ds}','cou',this.value)">
            <span style="font-size:8px;color:#333">cm</span>
          </div>
        </div>
        <div><div style="font-size:9px;color:#444;margin-bottom:2px">🔬 MG</div>
          <div style="display:flex;align-items:baseline;gap:2px">
            <input type="number" value="${ms.mg}" placeholder="${bfAuto||'—'}" step="0.1" style="background:none;border:none;border-bottom:1px solid ${bfAuto&&!ms.mg?'#ff880055':'#1e1e24'};color:${ms.mg?'#eee':bfAuto?'#ff8800':'#333'};font-size:12px;font-weight:700;width:36px;outline:none;padding:1px 0;font-family:inherit" onchange="saveMeasure('${ds}','mg',this.value)">
            <span style="font-size:8px;color:#333">%</span>
          </div>
          ${bfAuto&&!ms.mg?`<div style="font-size:8px;color:#ff880088">≈${bfAuto}%</div>`:''}
        </div>
      </div>
      ${(ms.mg||bfAuto)&&w?`<div style="padding-left:64px;margin-top:4px;display:flex;gap:10px">
        <span style="font-size:10px;color:#e74c3c;font-weight:700">${+(parseFloat(w)*(parseFloat(ms.mg)||bfAuto)/100).toFixed(1)}kg gras</span>
        <span style="font-size:10px;color:#2ecc71;font-weight:700">${+(parseFloat(w)-parseFloat(w)*(parseFloat(ms.mg)||bfAuto)/100).toFixed(1)}kg maigre</span>
      </div>`:''}
    </div>`;
  });
  html+=`</div>`;return html;
}

function saveMeasure(ds,field,val){
  if(!measures[ds])measures[ds]={tour:'',mg:'',cou:'',hip:''};
  if(field==='poids'){if(val&&+val>0)weights[ds]=+val;else delete weights[ds];ls.set(WK,weights);}
  else{measures[ds][field]=val&&+val>0?+val:'';ls.set(MK,measures);}
}
function saveNote(ds,val){
  notes[ds]=val;
  ls.set(NK,notes);
  // Feedback visuel
  const el=document.getElementById('note-saved');
  if(el){el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',1500);}
}

function shareDay(ds){
  const tot=totals(ds);
  const m=profile?calcMacros(profile):null;
  const on=isOn(ds);
  const tgt=m?{kcal:on?m.kcalOn:m.kcalOff,prot:m.prot}:null;
  const water=getWater(ds);
  const w=parseFloat(weights[ds])||0;
  const mg=parseFloat((measures[ds]||{}).mg)||0;
  const pctK=tgt?Math.round(tot.kcal/tgt.kcal*100):null;
  const pctP=tgt?Math.round(tot.prot/tgt.prot*100):null;

  const text=`🔥 Tatanka Nutrition — ${fmtD(ds)}
${on?'🔥 Jour ON':'❄️ Jour OFF'}

📊 Macros
${tot.kcal}kcal${tgt?' / '+tgt.kcal+'kcal ('+pctK+'%)':''}
${tot.prot}g protéines${tgt?' / '+tgt.prot+'g ('+pctP+'%)':''}
${tot.carbs}g glucides · ${tot.fat}g lipides

💧 Eau : ${water>=1000?(water/1000).toFixed(1)+'L':water+'ml'}
${w?'⚖️ Poids : '+w+'kg':''}
${mg?'🔬 MG : '+mg+'%'+(w?' · '+(+(w-w*mg/100).toFixed(1))+'kg maigre':''):''}`;

  if(navigator.share){
    navigator.share({title:'Tatanka Nutrition',text}).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(text).then(()=>toast('📋 Copié dans le presse-papier !','#9b59b6'));
  }
}

function deleteCustomFood(id){
  document.getElementById('confirm-modal')?.remove();
  const div=document.createElement('div');div.id='confirm-modal';div.className='modal-bg';
  div.innerHTML=`<div class="modal" style="padding-bottom:24px">
    <div class="modal-title">🗑 Supprimer cet aliment ?</div>
    <div style="font-size:12px;color:#555;margin-bottom:16px">Cette action est irréversible.</div>
    <div style="display:flex;gap:8px">
      <button onclick="confirmDeleteFood(${id})" style="flex:1;background:#e74c3c;border:none;border-radius:4px;color:#fff;font-weight:900;padding:12px;cursor:pointer">🗑 Supprimer</button>
      <button onclick="document.getElementById('confirm-modal').remove()" style="flex:1;background:none;border:1px solid #1c1c22;border-radius:4px;color:#555;padding:12px;cursor:pointer">Annuler</button>
    </div>
  </div>`;
  document.body.appendChild(div);
}
function confirmDeleteFood(id){
  document.getElementById('confirm-modal')?.remove();
  customFoods=customFoods.filter(f=>f.id!==id);
  DB=DB.filter(f=>f.id!==id);
  foodFavs=foodFavs.filter(x=>x!==id);
  ls.set(CK,customFoods);ls.set(FFK,foodFavs);
  toast('🗑 Supprimé','#e74c3c');render();
}

function renderP(){
  const p=profile||{poids:'',taille:'',age:'',genre:'homme',activite:'mod',objectif:'maintien',planning:[0,1,1,1,0,1,1],waterTarget:3000,manualMode:false};
  const m=calcMacros(profile);
  const adjOn=adj.adjOn||0,adjOff=adj.adjOff||0,hasAdj=adjOn!==0||adjOff!==0;
  const manualMode=p.manualMode||false;

  html+=`<div style="font-size:20px;font-weight:900;margin-bottom:14px">PROFIL <span style="color:#9b59b6">⚙️</span></div>
  <div class="card">
    <div class="ct">Données corporelles</div>
    <div class="g2" style="margin-bottom:10px">
      <div><label>Poids (kg)</label><input class="inp" id="pp" type="number" inputmode="decimal" value="${esc(String(p.poids))}" placeholder="80"></div>
      <div><label>Taille (cm)</label><input class="inp" id="pt" type="number" inputmode="decimal" value="${esc(String(p.taille))}" placeholder="178"></div>
      <div><label>Âge</label><input class="inp" id="pa" type="number" inputmode="numeric" value="${esc(String(p.age))}" placeholder="30"></div>
      <div><label>Genre</label><select class="sel" id="pg"><option value="homme" ${p.genre==='homme'?'selected':''}>Homme</option><option value="femme" ${p.genre==='femme'?'selected':''}>Femme</option></select></div>
    </div>
    <div style="margin-bottom:10px"><label>Activité</label>
      <select class="sel" id="pac">
        <option value="sed" ${p.activite==='sed'?'selected':''}>Sédentaire (×1.2)</option>
        <option value="light" ${p.activite==='light'?'selected':''}>Légère (×1.375)</option>
        <option value="mod" ${p.activite==='mod'?'selected':''}>Modérée (×1.55)</option>
        <option value="active" ${p.activite==='active'?'selected':''}>Active (×1.725)</option>
        <option value="vactive" ${p.activite==='vactive'?'selected':''}>Très active (×1.9)</option>
      </select>
    </div>
    <div style="margin-bottom:10px"><label>Objectif eau / jour (ml)</label>
      <input class="inp" id="pwt" type="number" inputmode="numeric" value="${esc(String(p.waterTarget||3000))}" placeholder="3000">
    </div>
    <div style="margin-bottom:12px"><label>Objectif</label>
      <div style="display:flex">
        <button class="obj-btn ${p.objectif==='prise'?'active':''}" onclick="setObjP('prise')">💪 MASSE<br><small style="font-weight:400;font-size:9px">+400kcal·2.5g/kg</small></button>
        <button class="obj-btn ${p.objectif==='maintien'?'active':''}" onclick="setObjP('maintien')">⚖️ MAINTIEN<br><small style="font-weight:400;font-size:9px">TDEE·2.2g/kg</small></button>
        <button class="obj-btn ${p.objectif==='seche'?'active':''}" onclick="setObjP('seche')">🔥 SÈCHE<br><small style="font-weight:400;font-size:9px">-18%·2.8g/kg</small></button>
      </div>
    </div>
    <div style="margin-bottom:14px"><label>Jours d'entraînement (ON)</label>
      <div style="display:flex;gap:4px;margin-top:4px">
        ${DAYS_LBL.map((d,i)=>`<button class="day-btn ${p.planning[i]?'on':''}" onclick="togDayP(${i})">${d}</button>`).join('')}
      </div>
    </div>
    <button class="btn" id="save-btn" style="width:100%;margin-bottom:0" onclick="saveP()">💾 Sauvegarder</button>
  </div>`;

  // Mode manuel
  html+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${manualMode?12:0}px">
      <div>
        <div style="font-size:13px;font-weight:700">🔧 Mode objectifs manuels</div>
        <div style="font-size:10px;color:#555;margin-top:2px">Saisir les calories directement</div>
      </div>
      <button onclick="togManualMode()" style="background:${manualMode?'#ff4c00':'#111'};border:1px solid ${manualMode?'#ff4c00':'#2a2a35'};border-radius:20px;color:#fff;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer">${manualMode?'ON':'OFF'}</button>
    </div>
    ${manualMode?`<div class="g2">
      <div><label>Kcal jour ON 🔥</label><input class="inp" id="pm-on" type="number" inputmode="numeric" value="${p.manualKcalOn||''}" placeholder="2500"></div>
      <div><label>Kcal jour OFF ❄️</label><input class="inp" id="pm-off" type="number" inputmode="numeric" value="${p.manualKcalOff||''}" placeholder="2000"></div>
    </div>
    <button onclick="saveManualMacros()" style="width:100%;margin-top:10px;background:#9b59b6;border:none;border-radius:4px;color:#fff;font-weight:900;padding:10px;cursor:pointer;font-size:14px">✓ Appliquer</button>`:''}
  </div>`;

  // Calcul %MG US Navy
  html+=`<div class="card">
    <div class="ct">Calcul %MG — Méthode US Navy</div>
    <div style="font-size:10px;color:#444;margin-bottom:12px;line-height:1.6">Précision ±2-3%. Mesures à prendre le matin, à jeun, avec un mètre ruban.</div>
    <div class="g${p.genre==='femme'?'3':'2'}" style="margin-bottom:12px">
      <div><label>Tour taille (cm)</label><input class="inp" id="bf-waist" type="number" inputmode="decimal" placeholder="80" oninput="updateBFCalc()"></div>
      <div><label>Tour cou (cm)</label><input class="inp" id="bf-neck" type="number" inputmode="decimal" placeholder="38" oninput="updateBFCalc()"></div>
      ${p.genre==='femme'?`<div><label>Tour hanches (cm)</label><input class="inp" id="bf-hip" type="number" inputmode="decimal" placeholder="95" oninput="updateBFCalc()"></div>`:''}
    </div>
    <div id="bf-result" style="background:#0a0a0d;border:1px solid #1c1c22;border-radius:4px;padding:12px;text-align:center;margin-bottom:12px">
      ${bfCalc?`<div style="font-size:28px;font-weight:900;color:#ff8800">${bfCalc}%</div><div style="font-size:10px;color:#555">dernière mesure enregistrée</div>`:'<div style="font-size:12px;color:#333">Entrez vos mesures ci-dessus</div>'}
    </div>
    <button onclick="saveBFToToday()" style="width:100%;background:none;border:1px solid #ff8800;border-radius:4px;color:#ff8800;padding:10px;font-size:12px;font-weight:700;cursor:pointer">💾 Enregistrer dans l'historique d'aujourd'hui</button>

var _offCache={};
var _searchTimer=null;

function searchOFF(q,mealKey){
  if(!q||q.length<2)return;
  var drop=document.getElementById('drop-off-'+mealKey);
  if(drop)drop.innerHTML='<div style="padding:10px 12px;font-size:12px;color:#555;text-align:center">Recherche en cours…</div>';

  function doSearch(url){
    return fetch(url,{headers:{'Accept':'application/json'}})
      .then(function(r){ if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); });
  }

  function processHits(data){
    // Supabase retourne un array direct, OFF retourne {products:[]}
    var hits=Array.isArray(data)?data:(data.products||data.hits||[]);
    var results=hits
      .filter(function(p){ return p.name_fr||p.product_name_fr||p.product_name; })
      .map(function(p,i){
        if(p.name_fr){
          // Format Supabase
          return {
            id:90000+Date.now()%9999+i,
            name:p.name_fr.substring(0,60),
            cat:'En ligne',
            kcal:Math.round(p.kcal||0),
            prot:parseFloat((p.prot||0).toFixed(1)),
            carbs:parseFloat((p.carbs||0).toFixed(1)),
            fat:parseFloat((p.fat||0).toFixed(1))
          };
        }
        var n=p.nutriments||{};
        var kcal=n['energy-kcal_100g']||Math.round((n['energy_100g']||0)/4.184);
        return {
          id:90000+Date.now()%9999+i,
          name:(p.product_name_fr||p.product_name||'').substring(0,60),
          cat:'En ligne',
          kcal:Math.round(kcal),
          prot:parseFloat((n.proteins_100g||0).toFixed(1)),
          carbs:parseFloat((n.carbohydrates_100g||0).toFixed(1)),
          fat:parseFloat((n.fat_100g||0).toFixed(1))
        };
      })
      .filter(function(p){ return p.kcal>0&&p.name.length>1; })
      .slice(0,10);
    return results;
  }

  function showResults(results){
    _offCache[mealKey]=results;
    var drop=document.getElementById('drop-off-'+mealKey);
    if(!drop)return;
    if(!results.length){
      drop.innerHTML='<div style="padding:10px 12px;font-size:12px;color:#444">Aucun résultat trouvé sur OpenFoodFacts</div>';
      return;
    }
    var html='';
    results.forEach(function(f,i){
      _offCache[mealKey+'_'+i]=f;
      var ck='offitem-'+mealKey+'-'+i;
      html+='<div class="di" id="'+ck+'"><div style="min-width:0;flex:1"><div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(f.name)+'</div><div style="font-size:11px;color:#444;margin-top:2px">'+f.kcal+' kcal · '+f.prot+'g P · '+f.carbs+'g G · '+f.fat+'g L</div></div><div style="color:#2ecc71;font-size:10px;font-weight:700;margin-left:10px;flex-shrink:0">WEB</div></div>';
    });
    drop.innerHTML=html;
    results.forEach(function(f,i){
      var el=document.getElementById('offitem-'+mealKey+'-'+i);
      if(el)(function(mk,idx){ el.addEventListener('click',function(){pickOFFItem(mk,idx);}); })(mealKey,i);
    });
  }

  // Proxy Vercel — évite les problèmes CORS/réseau avec OFF
  // Recherche directe Supabase
  var SUPA_URL='https://ogkrgsnnoebsvbgsngvm.supabase.co';
  var SUPA_KEY='sb_publishable_KvM3k3gwBAArOFyUEd1a7A_oY0RTIom';
  var supaUrl=SUPA_URL+'/rest/v1/aliments?name_fr=ilike.*'+encodeURIComponent(q)+'*&limit=10&select=name_fr,kcal,prot,carbs,fat';
  fetch(supaUrl,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}})
    .then(function(r){ if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){ showResults(processHits(data)); })
    .catch(function(){
      var drop=document.getElementById('drop-off-'+mealKey);
      if(drop)drop.innerHTML='<div style="padding:10px 12px;font-size:12px;color:#e74c3c">Recherche indisponible</div>';
    });
}

function pickOFFItem(mealKey,idx){
  var f=_offCache[mealKey+'_'+idx];
  if(!f)return;
  var existing=DB.find(function(d){return d.name===f.name&&d.kcal===f.kcal;});
  if(existing){
    if(!SS[mealKey])SS[mealKey]={q:'',food:null,grams:'100'};
    SS[mealKey].food=existing;SS[mealKey].q=existing.name;
  } else {
    var nid=90000+Date.now()%999999;
    var nf=Object.assign({},f,{id:nid});
    DB.push(nf);
    if(!SS[mealKey])SS[mealKey]={q:'',food:null,grams:'100'};
    SS[mealKey].food=nf;SS[mealKey].q=nf.name;
  }
  render();
}

function _updateLocalResults(k){
  const ss=SS[k]||{q:'',food:null};
  const q=ss.q.trim();
  const localDiv=document.getElementById('local-results-'+k);
  const webBlock=document.getElementById('web-block-'+k);
  const emptyBlock=document.getElementById('empty-block-'+k);
  if(!localDiv)return;

  if(q.length===0){
    // État vide : cacher résultats, montrer récents/favoris
    localDiv.style.display='none';
    if(webBlock)webBlock.style.display='none';
    if(emptyBlock)emptyBlock.style.display='';
  } else if(q.length===1){
    localDiv.style.display='none';
    if(webBlock)webBlock.style.display='none';
    if(emptyBlock)emptyBlock.style.display='';
  } else {
    if(emptyBlock)emptyBlock.style.display='none';
    // Récents : garder visibles seulement si le texte matche un récent
    const recentBlock=document.getElementById('recent-block-'+k);
    if(recentBlock){
      const recentFoodsNow=getRecentFoods();
      const hasRecentMatch=recentFoodsNow.some(f=>norm(f.name).includes(norm(q)));
      recentBlock.style.display=hasRecentMatch?'':'none';
    }
    // Résultats locaux
    const all=DB.filter(f=>norm(f.name).includes(norm(q)));
    const rF=all.filter(f=>foodFavs.includes(f.id));
    const rO=all.filter(f=>!foodFavs.includes(f.id));
    const res=[...rF,...rO].slice(0,14);
    if(res.length){
      localDiv.style.display='';
      let html='<div style="padding:6px 12px;font-size:9px;color:#555;background:#0d0d10;letter-spacing:.1em;font-weight:700;border-bottom:1px solid #1c1c22">📦 MA BASE ALIMENTAIRE</div>';
      res.forEach((f,i)=>{
        const isFav=foodFavs.includes(f.id);
        if(i===rF.length&&rO.length>0&&rF.length>0)
          html+=`<div style="padding:4px 12px;font-size:9px;color:#444;background:#111;border-bottom:1px solid #1e1e24;letter-spacing:.08em">AUTRES</div>`;
        html+=`<div class="di" onclick="pickF('${k}',${f.id})">

          </div>
        </div>`;
      });
      localDiv.innerHTML=html;

      localDiv.style.display='';
      localDiv.innerHTML=`<div style="padding:10px 12px;font-size:12px;color:#444">Aucun résultat local pour « ${esc(q)} »</div>`;

  const entries=getDay(date)[favModal.mealKey]||[];if(entries.length===0){closeFavModal();return;}
  favs.push({id:Date.now(),name,entries:JSON.parse(JSON.stringify(entries))});
  ls.set(FK,favs);closeFavModal();toast('💾 Repas sauvegardé !');
}
function loadFav(id){
  const fav=favs.find(f=>f.id===id);if(!fav||!favModal)return;
  const k=favModal.mealKey;const day=getDay(date);if(!day[k])day[k]=[];
  fav.entries.forEach(e=>{day[k].push({...e,id:Date.now()+Math.random()});});
  saveJ();closeFavModal();toast('📂 Repas chargé !');
}
function delFav(id){favs=favs.filter(f=>f.id!==id);ls.set(FK,favs);render();}
